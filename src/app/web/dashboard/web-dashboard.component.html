<div class="dash">
  <aside class="side" [class.side--open]="sideOpen">
    <div class="side__brand">
      <div class="side__mark">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="#fff"
          stroke-width="2.5"
          stroke-linecap="round"
          width="16"
          height="16"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </div>
      <span class="side__name">Go<b>Servi</b></span>
      <span class="side__badge">ADMIN</span>
    </div>
    <nav class="side__nav">
      <span class="side__section">Principal</span>
      <a
        routerLink="overview"
        routerLinkActive="side__link--on"
        class="side__link"
        (click)="sideOpen = false"
        ><svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" /></svg
        >Resumen</a
      >
      <a
        routerLink="stats"
        routerLinkActive="side__link--on"
        class="side__link"
        (click)="sideOpen = false"
        ><svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M18 20V10M12 20V4M6 20v-6" /></svg
        >Estadísticas</a
      >
      <a
        routerLink="finances"
        routerLinkActive="side__link--on"
        class="side__link"
        (click)="sideOpen = false"
        ><svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"
          /></svg
        >Finanzas</a
      >

      <span class="side__section">Gestión</span>
      <a
        routerLink="professionals"
        routerLinkActive="side__link--on"
        class="side__link"
        (click)="sideOpen = false"
        ><svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg
        >Profesionales</a
      >
      <a
        routerLink="clients"
        routerLinkActive="side__link--on"
        class="side__link"
        (click)="sideOpen = false"
        ><svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" /></svg
        >Clientes</a
      >
      <a
        routerLink="users"
        routerLinkActive="side__link--on"
        class="side__link"
        (click)="sideOpen = false"
        ><svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" /></svg
        >Usuarios</a
      >
      <a
        routerLink="bookings"
        routerLinkActive="side__link--on"
        class="side__link"
        (click)="sideOpen = false"
        ><svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" /></svg
        >Reservas</a
      >

      <span class="side__section">Soporte</span>
      <a
        routerLink="tickets"
        routerLinkActive="side__link--on"
        class="side__link"
        (click)="sideOpen = false"
        ><svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
          /></svg
        >Tickets</a
      >
      <a
        routerLink="reports"
        routerLinkActive="side__link--on"
        class="side__link"
        (click)="sideOpen = false"
        ><svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
          />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" /></svg
        >Reportes</a
      >
    </nav>
    <div class="side__footer">
      <div class="side__user">
        <div class="side__avatar">{{ initials }}</div>
        <div class="side__user-info">
          <span class="side__user-name">{{ userName }}</span
          ><span class="side__user-email">{{ userEmail }}</span>
        </div>
      </div>
      <button class="side__logout" (click)="logout()">Cerrar sesión</button>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <button class="topbar__ham" (click)="sideOpen = !sideOpen">
        <span></span><span></span><span></span></button
      ><span class="topbar__date">{{ today }}</span>
    </header>
    <div class="main__content"><router-outlet></router-outlet></div>
  </div>
  <div class="overlay" *ngIf="sideOpen" (click)="sideOpen = false"></div>
</div>
